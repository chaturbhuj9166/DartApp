name: firstapp

description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:

  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # API
  http: ^1.6.0

  # LOCAL STORAGE
  shared_preferences: ^2.5.5

  # STATE MANAGEMENT
  provider: ^6.1.5+1

  # IMAGE PICKER
  image_picker: ^1.2.2

  # LOCATION
  geolocator: ^13.0.1

  # PERMISSIONS
  permission_handler: ^11.3.1

  # LOCAL NOTIFICATIONS
  flutter_local_notifications: ^17.2.2

  # TIMEZONE
  timezone: ^0.9.4

dev_dependencies:

  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # APP ICON
  flutter_launcher_icons: ^0.14.4

flutter:

  uses-material-design: true

# =========================
# APP ICON
# =========================

flutter_icons:

  android: true

  ios: true

  image_path: "assets/icon-img.png"